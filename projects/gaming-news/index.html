<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaming News - Berita Gaming Terkini</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      color: #e94560;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .last-updated {
      color: #a0a0a0;
      font-size: 0.9rem;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
    }

    .news-card {
      background: #0f3460;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .news-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(233, 69, 96, 0.2);
    }

    .news-content {
      padding: 20px;
    }

    .news-category {
      display: inline-block;
      background: #e94560;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .news-source {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .source-logo {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      object-fit: contain;
      background: #1a1a2e;
      padding: 2px;
    }

    .source-name {
      color: #808080;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .news-title {
      color: #ffffff;
      font-size: 1.25rem;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .news-summary {
      color: #a0a0a0;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .cta-button {
      display: inline-block;
      background: #e94560;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background 0.3s ease;
    }

    .cta-button:hover {
      background: #ff6b6b;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
      }

      .news-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎮 Gaming News</h1>
      <p class="last-updated" id="lastUpdated"></p>
    </header>

    <main id="newsContainer"></main>
  </div>

  <script>
    // ============================================
    // DATA BERITA - EDIT DI SINI UNTUK UPDATE
    // ============================================
    const beritaData = {
        "lastUpdated": "2026-04-22T14:05:14.741+07:00",
        "berita": [
                {
                        "id": 1,
                        "judul": "PC Gamer",
                        "ringkasan": "PC Gamer is your source untuk exclusive reviews, demos, updates and news on all your favorite PC gaming franchises.",
                        "kategori": "Review",
                        "sumber": "https://www.pcgamer.com/",
                        "media": "PC Gamer",
                        "logo": "https://www.pcgamer.com/favicon.ico",
                        "gambar": "https://via.placeholder.com/400x200?text=PC%20Gamer"
                },
                {
                        "id": 2,
                        "judul": "After 2 years of silence, an extraction shooter we liked back in 2022 untuk its 'impeccable vibes' suddenly springs back to life on Steam",
                        "ringkasan": "Remember Marauders?",
                        "kategori": "FPS",
                        "sumber": "https://www.pcgamer.com/games/fps/after-2-years-of-silence-an-extraction-shooter-we-liked-back-in-2022-for-its-impeccable-vibes-suddenly-springs-back-to-life-on-steam/",
                        "media": "PC Gamer",
                        "logo": "https://www.pcgamer.com/favicon.ico",
                        "gambar": "https://via.placeholder.com/400x200?text=After%202%20years%20of"
                },
                {
                        "id": 3,
                        "judul": "Owlcat's had some unusual problems writing romance: 'we realized we had three female romanceable characters, and all three were cannibals'",
                        "ringkasan": "I can fix them.",
                        "kategori": "News",
                        "sumber": "https://www.pcgamer.com/games/rpg/owlcats-had-some-unusual-problems-writing-romance-we-realized-we-had-three-female-romanceable-characters-and-all-three-were-cannibals/",
                        "media": "PC Gamer",
                        "logo": "https://www.pcgamer.com/favicon.ico",
                        "gambar": "https://via.placeholder.com/400x200?text=Owlcats%20had%20some%20unusual"
                }
        ]
};
    // ============================================

    function renderBerita() {
      const lastUpdatedEl = document.getElementById('lastUpdated');
      const container = document.getElementById('newsContainer');

      // Tampilkan timestamp last updated
      const formattedDate = new Date(beritaData.lastUpdated).toLocaleString('id-ID', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
      lastUpdatedEl.textContent = `Terakhir diupdate: ${formattedDate}`;

      // Render news cards
      container.innerHTML = `
        <div class="news-grid">
          ${beritaData.berita.map(item => `
            <article class="news-card">
              <div class="news-content">
                <span class="news-category">${item.kategori}</span>
                <h2 class="news-title">${item.judul}</h2>
                <p class="news-summary">${item.ringkasan}</p>
                <a href="${item.sumber}" target="_blank" rel="noopener noreferrer" class="cta-button">
                  Baca Selengkapnya →
                </a>
                <div class="news-source">
                  <img src="${item.logo}" alt="${item.media}" class="source-logo" onerror="this.style.display='none'">
                  <span class="source-name">${item.media}</span>
                </div>
              </div>
            </article>
          `).join('')}
        </div>
      `;
    }

    // Render saat halaman siap
    document.addEventListener('DOMContentLoaded', renderBerita);
  </script>
</body>
</html>
